<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affectations — Pointage Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-2 flex gap-4 text-sm flex-wrap">
      <a href="index.html" class="py-3 px-2 hover:text-blue-600">📋 Pointage</a>
      <a href="chantiers.html" class="py-3 px-2 hover:text-blue-600">🏗️ Chantiers</a>
      <a href="salaires.html" class="py-3 px-2 hover:text-blue-600">👷 Salariés</a>
      <a href="calendrier.html" class="py-3 px-2 hover:text-blue-600">📅 Calendrier</a>
      <a href="affectations.html" class="py-3 px-2 border-blue-500 border-b-2 text-blue-600 font-semibold">📝 Affectations</a>
      <a href="rapports.html" class="py-3 px-2 hover:text-blue-600">📊 Rapports</a>
      <a href="financier.html" class="py-3 px-2 hover:text-blue-600">💰 Financier</a>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">📝 Affectations</h1>
      <div class="flex gap-2">
        <button onclick="openAdd()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Nouvelle affectation</button>
      </div>
    </div>

    <!-- Existing affectations -->
    <div class="bg-white rounded-xl shadow overflow-x-auto mb-6">
      <table class="w-full text-sm">
        <thead><tr class="border-b bg-gray-50">
          <th class="p-3 text-left text-gray-600">Salarié</th>
          <th class="p-3 text-left text-gray-600">Chantier</th>
          <th class="p-3 text-left text-gray-600">Du</th>
          <th class="p-3 text-left text-gray-600">Au</th>
          <th class="p-3 text-center text-gray-600">Action</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Quick generate -->
    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="font-semibold mb-3">Générer les pointages automatiques</h2>
      <div class="flex gap-3 items-center">
        <input type="date" id="g-from" class="border rounded-lg px-3 py-2 text-sm">
        <input type="date" id="g-to" class="border rounded-lg px-3 py-2 text-sm">
        <button onclick="generate()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">Générer</button>
        <span id="g-result" class="text-xs text-green-600"></span>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
      <h2 id="modal-title" class="text-lg font-bold mb-4">Nouvelle affectation</h2>
      <div class="space-y-3">
        <label class="text-sm"><span class="text-gray-500">Salarié</span>
          <select id="a-sal" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <label class="text-sm"><span class="text-gray-500">Chantier</span>
          <select id="a-chan" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <div class="flex gap-3">
          <label class="flex-1 text-sm"><span class="text-gray-500">Du</span>
            <input type="date" id="a-debut" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
          </label>
          <label class="flex-1 text-sm"><span class="text-gray-500">Au</span>
            <input type="date" id="a-fin" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
          </label>
        </div>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button onclick="closeModal()" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50">Annuler</button>
        <button onclick="saveAffectation()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    const today = new Date();
    const ds = d => d.toISOString().split("T")[0];
    const nextFri = new Date(today); nextFri.setDate(today.getDate() + (5 - today.getDay() + 7) % 7);
    document.getElementById("g-from").value = ds(today);
    document.getElementById("g-to").value = ds(nextFri);

    async function loadSelects() {
      const [sRes, cRes] = await Promise.all([fetch("/api/salaries"), fetch("/api/chantiers")]);
      const salaries = await sRes.json();
      const chantiers = await cRes.json();

      document.getElementById("a-sal").innerHTML = salaries.map(s => `<option value="${s.id}">${s.nom} ${s.prenom}</option>`).join("");
      document.getElementById("a-chan").innerHTML = chantiers.map(c => `<option value="${c.id}">${c.nom}</option>`).join("");
    }

    async function loadAffectations() {
      const res = await fetch("/api/affectations");
      const affs = await res.json();
      document.getElementById("tbody").innerHTML = affs.length === 0
        ? `<tr><td class="p-4 text-gray-400 text-center" colspan="5">Aucune affectation</td></tr>`
        : affs.map(a => `
          <tr class="border-b hover:bg-gray-50">
            <td class="p-3 font-medium">${a.nom} ${a.prenom}</td>
            <td class="p-3">${a.chantier_nom}</td>
            <td class="p-3">${a.date_debut}</td>
            <td class="p-3">${a.date_fin}</td>
            <td class="p-3 text-center">
              <button onclick="delAff(${a.id})" class="text-red-500 text-xs">Supprimer</button>
            </td>
          </tr>`).join("");
    }

    function openAdd() {
      // Default dates: next monday to end of next week
      const nextMon = new Date(today); nextMon.setDate(today.getDate() + ((1 - today.getDay() + 7) % 7));
      const endFri = new Date(nextMon); endFri.setDate(nextMon.getDate() + 4);
      document.getElementById("a-debut").value = ds(nextMon);
      document.getElementById("a-fin").value = ds(endFri);
      document.getElementById("modal").classList.remove("hidden");
    }
    function closeModal() { document.getElementById("modal").classList.add("hidden"); }

    async function delAff(id) {
      if (!confirm("Supprimer cette affectation ?")) return;
      await fetch("/api/affectations/" + id, { method: "DELETE" });
      loadAffectations();
    }

    async function saveAffectation() {
      const sal = parseInt(document.getElementById("a-sal").value);
      const chan = parseInt(document.getElementById("a-chan").value);
      const db = document.getElementById("a-debut").value;
      const fin = document.getElementById("a-fin").value;
      if (!sal || !chan || !db || !fin) return alert("Tous les champs sont obligatoires");

      await fetch("/api/affectations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ salarie_id: sal, chantier_id: chan, date_debut: db, date_fin: fin, horaires: "auto" })
      });
      closeModal();
      loadAffectations();
    }

    async function generate() {
      const from = document.getElementById("g-from").value;
      const to = document.getElementById("g-to").value;
      if (!from || !to) return;
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ from, to })
      });
      const data = await res.json();
      document.getElementById("g-result").textContent = data.message || "Fait !";
    }

    loadSelects();
    loadAffectations();
  </script>
</body>
</html>

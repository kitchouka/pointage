<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendrier — Pointage Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-2 flex gap-4 text-sm flex-wrap">
      <a href="index.html" class="py-3 px-2 hover:text-blue-600">📋 Pointage</a>
      <a href="chantiers.html" class="py-3 px-2 hover:text-blue-600">🏗️ Chantiers</a>
      <a href="salaires.html" class="py-3 px-2 hover:text-blue-600">👷 Salariés</a>
      <a href="calendrier.html" class="py-3 px-2 border-blue-500 border-b-2 text-blue-600 font-semibold">📅 Calendrier</a>
      <a href="rapports.html" class="py-3 px-2 hover:text-blue-600">📊 Rapports</a>
      <a href="financier.html" class="py-3 px-2 hover:text-blue-600">💰 Financier</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">📅 Calendrier des affectations</h1>
      <div class="flex gap-2 items-center">
        <button onclick="prevMonth()" class="bg-white border rounded-lg px-3 py-2 text-sm hover:bg-gray-50">◀</button>
        <span id="month-label" class="text-lg font-semibold min-w-40 text-center"></span>
        <button onclick="nextMonth()" class="bg-white border rounded-lg px-3 py-2 text-sm hover:bg-gray-50">▶</button>
      </div>
    </div>

    <div id="calendar-grid" class="grid grid-cols-7 gap-1">
      <!-- Header row -->
    </div>

    <!-- Légende -->
    <div id="chantier-legend" class="mt-6 flex flex-wrap gap-2"></div>
  </div>

  <script>
    const JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const MOIS_NOMS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

    let currentYear, currentMonth;
    let chantierColors = {};
    const CHANTIER_COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

    async function loadData() {
      const [chanRes, affRes] = await Promise.all([fetch("/api/chantiers"), fetch("/api/affectations")]);
      const chantiers = await chanRes.json();
      const affectations = await affRes.json();

      // Assign colors
      chantiers.forEach((c, i) => { chantierColors[c.id] = CHANTIER_COLORS[i % CHANTIER_COLORS.length]; });

      // Legend
      document.getElementById("chantier-legend").innerHTML = chantiers.map(c =>
        `<span class="inline-flex items-center gap-1 text-xs"><span class="w-3 h-3 rounded-full" style="background:${chantierColors[c.id]}"></span>${c.nom}</span>`
      ).join("");

      renderCalendar(chantiers, affectations);
    }

    function initMonth() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
    }

    function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} loadData(); }
    function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} loadData(); }

    function renderCalendar(chantiers, affectations) {
      document.getElementById("month-label").textContent = MOIS_NOMS[currentMonth] + " " + currentYear;

      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      // Header
      JOURS.forEach(j => {
        const h = document.createElement("div");
        h.className = "p-2 text-center text-xs font-semibold text-gray-500 border-b";
        h.textContent = j;
        grid.appendChild(h);
      });

      // First day of month (0=Sun, convert to Mon=0)
      const first = new Date(currentYear, currentMonth, 1);
      let startDay = first.getDay() - 1;
      if (startDay < 0) startDay = 6;

      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();
      const todayStr = today.toISOString().split("T")[0];

      // Week number column
      // Total cells
      const totalCells = startDay + daysInMonth;
      const rows = Math.ceil(totalCells / 7);

      // Build data: for each day, list of salarie+chantier
      const monthStr = String(currentMonth + 1).padStart(2, "0");
      const monthAffs = affectations.filter(a => {
        // Check if affectation overlaps with this month
        return a.date_debut.slice(0, 7) <= `${currentYear}-${monthStr}` && a.date_fin.slice(0, 7) >= `${currentYear}-${monthStr}`;
      });

      const dayData = {};
      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${currentYear}-${monthStr}-${String(d).padStart(2, "0")}`;
        const dObj = new Date(currentYear, currentMonth, d);
        const dow = dObj.getDay();
        if (dow >= 1 && dow <= 5) { // weekday
          dayData[d] = monthAffs.filter(a => a.date_debut <= date && a.date_fin >= date);
        } else {
          dayData[d] = [];
        }
      }

      // Empty cells before start
      for (let i = 0; i < startDay; i++) {
        const e = document.createElement("div");
        e.className = "border p-1 min-h-24 bg-gray-100";
        grid.appendChild(e);
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement("div");
        cell.className = "border p-1 min-h-24 bg-white hover:bg-blue-50";
        if (d === parseInt(todayStr.split("-")[2]) && currentYear === parseInt(todayStr.split("-")[0]) && currentMonth === parseInt(todayStr.split("-")[1]) - 1) {
          cell.classList.add("ring-2", "ring-blue-500");
        }

        const num = document.createElement("div");
        num.className = "text-xs font-medium text-gray-700 mb-1";
        num.textContent = d;
        cell.appendChild(num);

        const affs = dayData[d] || [];
        if (affs.length > 0) {
          // Group by chantier
          const byChan = {};
          affs.forEach(a => {
            if (!byChan[a.chantier_id]) byChan[a.chantier_id] = [];
            byChan[a.chantier_id].push(a);
          });
          for (const [cid, affList] of Object.entries(byChan)) {
            const tag = document.createElement("div");
            tag.className = "text-xs rounded px-1 py-0.5 mb-0.5 truncate text-white";
            tag.style.backgroundColor = chantierColors[cid] || "#555";
            tag.textContent = `${affList[0].chantier_nom} (${affList.length})`;
            cell.appendChild(tag);
          }
        }

        grid.appendChild(cell);
      }
    }

    initMonth();
    loadData();
  </script>
</body>
</html>

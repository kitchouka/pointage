<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage — Pointage Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=checkbox].toggle { width: 18px; height: 18px; cursor: pointer; }
    .sal-block { border-left: 3px solid #e5e7eb; }
    .sal-block.has-data { border-left-color: #3b82f6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-2 flex gap-4 text-sm flex-wrap">
      <a href="index.html" class="py-3 px-2 border-blue-500 border-b-2 text-blue-600 font-semibold">📋 Pointage</a>
      <a href="chantiers.html" class="py-3 px-2 hover:text-blue-600">🏗️ Chantiers</a>
      <a href="salaires.html" class="py-3 px-2 hover:text-blue-600">👷 Salariés</a>
      <a href="calendrier.html" class="py-3 px-2 hover:text-blue-600">📅 Calendrier</a>
      <a href="rapports.html" class="py-3 px-2 hover:text-blue-600">📊 Rapports</a>
      <a href="financier.html" class="py-3 px-2 hover:text-blue-600">💰 Financier</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">📋 Pointage du jour</h1>
        <p class="text-xs text-gray-500 mt-1">Un salarié peut avoir plusieurs lignes (ex: matin chantier A, aprem absence).</p>
      </div>
      <div class="flex gap-2 items-center">
        <input type="date" id="pointage-date" class="border rounded-lg px-3 py-2 text-sm">
        <button onclick="saveAll()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">💾 Sauvegarder tout</button>
        <button onclick="openGenModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">⚡ Générer</button>
      </div>
    </div>

    <!-- Alertes -->
    <div id="alertes-bar" class="hidden mb-4"></div>

    <!-- Grille par salarié -->
    <div id="salarie-grid" class="space-y-3"></div>

    <div id="msg" class="mt-4 text-sm text-green-600 hidden font-medium"></div>
  </div>

  <!-- Modal Génération -->
  <div id="gen-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-96">
      <h2 class="text-lg font-bold mb-4">⚡ Affecter un salarié à un chantier</h2>
      <p class="text-xs text-gray-500 mb-4">Génère les pointages 8h-17h (Lun-Jeu) ou 8h-16h (Ven) pour la période choisie.</p>
      <div class="space-y-3">
        <label class="text-sm block">
          <span class="text-gray-500">Salarié</span>
          <select id="g-sal" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <label class="text-sm block">
          <span class="text-gray-500">Chantier</span>
          <select id="g-chan" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <div class="flex gap-3">
          <label class="flex-1 text-sm"><span class="text-gray-500">Du</span>
            <input type="date" id="g-from" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
          </label>
          <label class="flex-1 text-sm"><span class="text-gray-500">Au</span>
            <input type="date" id="g-to" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
          </label>
        </div>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button onclick="closeGenModal()" class="px-4 py-2 text-sm border rounded-lg">Annuler</button>
        <button onclick="doGenerate()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg">Générer</button>
      </div>
      <p id="g-result" class="mt-3 text-sm text-green-600 hidden"></p>
    </div>
  </div>

  <script>
    const today = new Date();
    const ds = d => d.toISOString().split("T")[0];
    document.getElementById("pointage-date").value = ds(today);
    document.getElementById("g-from").value = ds(today);
    const nextFri = new Date(today); nextFri.setDate(today.getDate() + ((5 - today.getDay() + 7) % 7));
    document.getElementById("g-to").value = ds(nextFri);

    let allSal = [], allChan = [];

    async function load() {
      [allSal, allChan] = await Promise.all([
        fetch("/api/salaries").then(r=>r.json()),
        fetch("/api/chantiers").then(r=>r.json())
      ]);
      // Populate modal selects
      document.getElementById("g-sal").innerHTML = allSal.map(s => `<option value="${s.id}">${s.nom} ${s.prenom}</option>`).join("");
      document.getElementById("g-chan").innerHTML = allChan.map(c => `<option value="${c.id}">${c.nom}</option>`).join("");
      loadForDate(document.getElementById("pointage-date").value);
    }

    async function loadForDate(date) {
      if (!date) return;
      const [pts, alers] = await Promise.all([
        fetch(`/api/pointages?date=${date}`).then(r=>r.json()),
        fetch(`/api/alertes?date=${date}`).then(r=>r.json())
      ]);

      const abar = document.getElementById("alertes-bar");
      if (alers.length > 0) {
        abar.classList.remove("hidden");
        abar.innerHTML = alers.map(a => `<div class="bg-amber-50 border-l-4 border-amber-400 px-4 py-2 text-sm">${a.type === "double_affectation" ? "🔴" : "🟡"} ${a.message}</div>`).join("");
      } else abar.classList.add("hidden");

      render(pts);
    }

    function render(pointages) {
      const grid = document.getElementById("salarie-grid");
      grid.innerHTML = "";

      // Group by salarie_id
      const bySal = {};
      pointages.forEach(p => {
        if (!bySal[p.salarie_id]) bySal[p.salarie_id] = [];
        bySal[p.salarie_id].push(p);
      });

      for (const s of allSal) {
        const pts = bySal[s.id] || [];
        if (pts.length === 0) pts.push({}); // empty row

        const block = document.createElement("div");
        block.className = "sal-block bg-white rounded-xl shadow overflow-hidden";
        block.dataset.salId = s.id;

        // Header with employee name + add line button
        const head = document.createElement("div");
        head.className = "bg-gray-50 px-4 py-2 flex items-center justify-between border-b";
        head.innerHTML = `<span class="font-semibold text-sm">${s.nom} ${s.prenom}</span>
          <button onclick="addLine(this, ${s.id})" class="text-blue-600 text-xs border border-blue-300 rounded px-2 py-0.5 hover:bg-blue-50">+ Ligne</button>`;
        block.appendChild(head);

        // Lines container
        const linesDiv = document.createElement("div");
        linesDiv.className = "lines-container";
        linesDiv.dataset.salId = s.id;

        pts.forEach((pt, idx) => {
          const hasFullDay = pt.heure_arrivee === "08:00" && (pt.heure_depart === "17:00" || pt.heure_depart === "16:00");
          const isFri = date => { const d = new Date(date); return d.getDay() === 5; };
          const dateStr = document.getElementById("pointage-date").value;
          const isFriday = isFri(dateStr);

          const line = document.createElement("div");
          line.className = "line-row flex items-center gap-2 px-4 py-2 " + (idx % 2 === 0 ? "bg-white" : "bg-gray-50/50");
          line.innerHTML = `
            <label class="text-xs text-gray-400 w-4">${idx+1}</label>
            <input type="checkbox" class="toggle full-day-cb" ${hasFullDay ? 'checked' : ''} title="Journée complète">
            <input type="time" class="border rounded px-2 py-1 text-sm w-24 arr" value="${pt.heure_arrivee || ""}" ${hasFullDay ? 'disabled' : ''}>
            <input type="time" class="border rounded px-2 py-1 text-sm w-24 dep" value="${pt.heure_depart || ""}" ${hasFullDay ? 'disabled' : ''}>
            <select class="border rounded px-2 py-1 text-sm min-w-32 chantier-sel">
              <option value="">-- Chantier --</option>
              ${allChan.map(c => `<option value="${c.id}" ${String(pt.chantier_id) == String(c.id) ? 'selected' : ''}>${c.nom}</option>`).join("")}
            </select>
            <input type="checkbox" class="toggle absent-cb" ${pt.motif_absence ? 'checked' : ''}>
            <input type="text" class="border rounded px-2 py-1 text-sm w-28 motif" placeholder="Motif" value="${pt.motif_absence || ""}" ${pt.motif_absence ? '' : 'disabled'}>
            <button onclick="delLine(this)" class="text-red-400 text-xs hover:text-red-600 ${pts.length <= 1 ? 'invisible' : ''}">✕</button>
          `;
          linesDiv.appendChild(line);
        });

        block.appendChild(linesDiv);

        // Bottom actions: checkbox "Absent toute la journée" etc.
        const bottom = document.createElement("div");
        bottom.className = "px-4 py-1.5 border-t bg-gray-50/30 flex gap-4 items-center text-xs text-gray-500";
        bottom.innerHTML = `<label><input type="checkbox" class="toggle desactive-cb"> Désactivé (pas de pointage)</label>`;
        block.appendChild(bottom);

        grid.appendChild(block);
      }

      // Wire up events
      document.querySelectorAll(".full-day-cb").forEach(cb => {
        cb.addEventListener("change", e => {
          const row = e.target.closest(".line-row");
          const arr = row.querySelector(".arr");
          const dep = row.querySelector(".dep");
          const date = document.getElementById("pointage-date").value;
          const isFri = new Date(date).getDay() === 5;
          if (e.target.checked) {
            arr.value = "08:00";
            dep.value = isFri ? "16:00" : "17:00";
            arr.disabled = true; dep.disabled = true;
          } else {
            arr.disabled = false; dep.disabled = false;
          }
        });
      });

      document.querySelectorAll(".absent-cb").forEach(cb => {
        cb.addEventListener("change", e => {
          const row = e.target.closest(".line-row");
          const motif = row.querySelector(".motif");
          const fullCb = row.querySelector(".full-day-cb");
          const arr = row.querySelector(".arr");
          const dep = row.querySelector(".dep");
          if (e.target.checked) {
            motif.disabled = false; motif.focus();
            fullCb.checked = false; fullCb.disabled = true;
            arr.disabled = true; dep.disabled = true;
            arr.value = ""; dep.value = "";
          } else {
            motif.disabled = true; motif.value = "";
            fullCb.disabled = false;
            arr.disabled = false; dep.disabled = false;
          }
        });
      });
    }

    function addLine(btn, salId) {
      const container = btn.closest(".sal-block").querySelector(".lines-container");
      const cnt = container.querySelectorAll(".line-row").length + 1;
      const date = document.getElementById("pointage-date").value;
      const isFri = new Date(date).getDay() === 5;
      const line = document.createElement("div");
      line.className = "line-row flex items-center gap-2 px-4 py-2 bg-gray-50/50";
      line.innerHTML = `
        <label class="text-xs text-gray-400 w-4">${cnt}</label>
        <input type="checkbox" class="toggle full-day-cb">
        <input type="time" class="border rounded px-2 py-1 text-sm w-24 arr">
        <input type="time" class="border rounded px-2 py-1 text-sm w-24 dep">
        <select class="border rounded px-2 py-1 text-sm min-w-32 chantier-sel"><option value="">-- Chantier --</option>
          ${allChan.map(c => `<option value="${c.id}">${c.nom}</option>`).join("")}
        </select>
        <input type="checkbox" class="toggle absent-cb">
        <input type="text" class="border rounded px-2 py-1 text-sm w-28 motif" placeholder="Motif" disabled>
        <button onclick="delLine(this)" class="text-red-400 text-xs hover:text-red-600">✕</button>
      `;
      container.appendChild(line);

      // Wire up events for new line
      const fullCb = line.querySelector(".full-day-cb");
      fullCb.addEventListener("change", e => {
        const arr = line.querySelector(".arr"), dep = line.querySelector(".dep");
        if (e.target.checked) {
          arr.value = "08:00"; dep.value = isFri ? "16:00" : "17:00";
          arr.disabled = true; dep.disabled = true;
        } else { arr.disabled = false; dep.disabled = false; }
      });
      line.querySelector(".absent-cb").addEventListener("change", e => {
        const motif = line.querySelector(".motif"), fullCb = line.querySelector(".full-day-cb");
        const arr = line.querySelector(".arr"), dep = line.querySelector(".dep");
        if (e.target.checked) {
          motif.disabled = false;
          fullCb.checked = false; fullCb.disabled = true;
          arr.disabled = true; dep.disabled = true;
          arr.value = ""; dep.value = "";
        } else {
          motif.disabled = true; motif.value = "";
          fullCb.disabled = false;
          arr.disabled = false; dep.disabled = false;
        }
      });
    }

    function delLine(btn) {
      const container = btn.closest(".lines-container");
      if (container.querySelectorAll(".line-row").length <= 1) return;
      const row = btn.closest(".line-row");
      row.remove();
      // Renumber
      container.querySelectorAll(".line-row").forEach((r, i) => {
        r.querySelector("label").textContent = i + 1;
      });
    }

    async function saveAll() {
      const date = document.getElementById("pointage-date").value;
      const lines = [];

      document.querySelectorAll(".sal-block").forEach(block => {
        const salId = parseInt(block.dataset.salId);
        const desactive = block.querySelector(".desactive-cb").checked;
        if (desactive) return;

        block.querySelectorAll(".line-row").forEach(row => {
          const fullDay = row.querySelector(".full-day-cb").checked;
          const absent = row.querySelector(".absent-cb").checked;
          const chantId = row.querySelector(".chantier-sel").value;
          const motif = row.querySelector(".motif").value;
          let arr = row.querySelector(".arr").value;
          let dep = row.querySelector(".dep").value;

          if (absent) {
            lines.push({ salarie_id: salId, chantier_id: null, heure_arrivee: null, heure_depart: null, motif_absence: motif, type: "manuel" });
          } else if (chantId) {
            if (fullDay || (!arr && !dep)) {
              const isFri = new Date(date).getDay() === 5;
              arr = "08:00";
              dep = isFri ? "16:00" : "17:00";
            }
            lines.push({ salarie_id: salId, chantier_id: parseInt(chantId), heure_arrivee: arr, heure_depart: dep, motif_absence: null, type: "manuel" });
          }
        });
      });

      if (lines.length === 0) {
        document.getElementById("msg").textContent = "Rien à sauvegarder (tout est décoché ou désactivé)";
        document.getElementById("msg").classList.remove("hidden");
        setTimeout(() => document.getElementById("msg").classList.add("hidden"), 3000);
        return;
      }

      await fetch("/api/pointages/bulk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date, lines })
      });

      const msgEl = document.getElementById("msg");
      msgEl.textContent = `${lines.length} ligne(s) sauvegardée(s) ✅`;
      msgEl.classList.remove("hidden");
      setTimeout(() => msgEl.classList.add("hidden"), 3000);
      loadForDate(date);
    }

    function openGenModal() { document.getElementById("gen-modal").classList.remove("hidden"); }
    function closeGenModal() { document.getElementById("gen-modal").classList.add("hidden"); document.getElementById("g-result").classList.add("hidden"); }

    async function doGenerate() {
      const salId = document.getElementById("g-sal").value;
      const chanId = document.getElementById("g-chan").value;
      const from = document.getElementById("g-from").value, to = document.getElementById("g-to").value;
      if (!salId || !chanId || !from || !to) return alert("Choisis un salarié, un chantier et une période");
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ salarie_id: parseInt(salId), chantier_id: parseInt(chanId), from, to })
      });
      const data = await res.json();
      const r = document.getElementById("g-result");
      r.textContent = data.message || "Fait !";
      r.classList.remove("hidden");
      setTimeout(() => { closeGenModal(); loadForDate(document.getElementById("pointage-date").value); }, 2000);
    }

    document.getElementById("pointage-date").addEventListener("change", e => loadForDate(e.target.value));
    load();
  </script>
</body>
</html>

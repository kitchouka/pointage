<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage — Pointage Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=checkbox].toggle { width: 18px; height: 18px; cursor: pointer; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-2 flex gap-4 text-sm flex-wrap">
      <a href="index.html" class="py-3 px-2 border-blue-500 border-b-2 text-blue-600 font-semibold">📋 Pointage</a>
      <a href="chantiers.html" class="py-3 px-2 hover:text-blue-600">🏗️ Chantiers</a>
      <a href="salaires.html" class="py-3 px-2 hover:text-blue-600">👷 Salariés</a>
      <a href="calendrier.html" class="py-3 px-2 hover:text-blue-600">📅 Calendrier</a>
      <a href="rapports.html" class="py-3 px-2 hover:text-blue-600">📊 Rapports</a>
      <a href="financier.html" class="py-3 px-2 hover:text-blue-600">💰 Financier</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">📋 Pointage du jour</h1>
      <div class="flex gap-2 items-center">
        <input type="date" id="pointage-date" class="border rounded-lg px-3 py-2 text-sm">
        <button onclick="saveAll()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">💾 Sauvegarder tout</button>
        <button onclick="openGenModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">⚡ Générer</button>
      </div>
    </div>

    <!-- Alertes -->
    <div id="alertes-bar" class="hidden mb-4"></div>

    <!-- Tableau -->
    <div class="bg-white rounded-xl shadow overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead>
          <tr class="border-b bg-gray-50">
            <th class="p-3 text-left text-gray-600 w-10">☑</th>
            <th class="p-3 text-left text-gray-600">Salarié</th>
            <th class="p-3 text-left text-gray-600">Journée compl.</th>
            <th class="p-3 text-left text-gray-600 w-28">Arrivée</th>
            <th class="p-3 text-left text-gray-600 w-28">Départ</th>
            <th class="p-3 text-left text-gray-600">Chantier</th>
            <th class="p-3 text-left text-gray-600">Absent</th>
            <th class="p-3 text-left text-gray-600 w-36">Motif</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="msg" class="mt-4 text-sm text-green-600 hidden font-medium"></div>
  </div>

  <!-- Modal Génération -->
  <div id="gen-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-96">
      <h2 class="text-lg font-bold mb-4">⚡ Générer les pointages</h2>
      <p class="text-xs text-gray-500 mb-4">Les pointages sont auto-générés depuis les affectations (Lun-Jeu 8h-17h, Ven 8h-16h).</p>
      <div class="space-y-3">
        <label class="text-sm block"><span class="text-gray-500">Du</span>
          <input type="date" id="g-from" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
        </label>
        <label class="text-sm block"><span class="text-gray-500">Au</span>
          <input type="date" id="g-to" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm">
        </label>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button onclick="closeGenModal()" class="px-4 py-2 text-sm border rounded-lg">Annuler</button>
        <button onclick="doGenerate()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg">Générer</button>
      </div>
      <p id="g-result" class="mt-3 text-sm text-green-600 hidden"></p>
    </div>
  </div>

  <script>
    const today = new Date();
    const ds = d => d.toISOString().split("T")[0];

    // Init dates
    document.getElementById("pointage-date").value = ds(today);

    let allSalaires = [];
    let allChantiers = [];
    let pointages = {};

    // Init gen dates
    document.getElementById("g-from").value = ds(today);
    const nextFri = new Date(today); nextFri.setDate(today.getDate() + ((5 - today.getDay() + 7) % 7));
    document.getElementById("g-to").value = ds(nextFri);

    async function load() {
      [allSalaires, allChantiers] = await Promise.all([
        fetch("/api/salaries").then(r => r.json()),
        fetch("/api/chantiers").then(r => r.json())
      ]);
      loadForDate(document.getElementById("pointage-date").value);
    }

    async function loadForDate(date) {
      if (!date) return;
      const res = await fetch(`/api/pointages?date=${date}`);
      const pts = await res.json();
      pointages = {};
      pts.forEach(p => { pointages[p.salarie_id] = p; });

      // Alertes
      const alers = await fetch(`/api/alertes?date=${date}`).then(r => r.json());
      const abar = document.getElementById("alertes-bar");
      if (alers.length > 0) {
        abar.classList.remove("hidden");
        abar.innerHTML = alers.map(a =>
          `<div class="bg-amber-50 border-l-4 border-amber-400 px-4 py-2 text-sm">${a.type === "double_affectation" ? "🔴" : "🟡"} ${a.message}</div>`
        ).join("");
      } else {
        abar.classList.add("hidden");
      }

      render();
    }

    function render() {
      const tb = document.getElementById("tbody");
      tb.innerHTML = "";

      for (const s of allSalaires) {
        const pt = pointages[s.id] || {};
        const tr = document.createElement("tr");
        tr.className = "border-b hover:bg-gray-50";
        tr.dataset.salarieId = s.id;

        const hasHeure = pt.heure_arrivee && pt.heure_depart;
        const isFullDay = hasHeure && pt.heure_arrivee === "08:00" && (pt.heure_depart === "17:00" || pt.heure_depart === "16:00");
        const isAbsent = pt.motif_absence ? true : false;

        const chanOpts = allChantiers.map(c =>
          `<option value="${c.id}" ${String(pt.chantier_id) == String(c.id) ? 'selected' : ''}>${c.nom}</option>`
        ).join("");

        tr.innerHTML = `
          <td class="p-3"><input type="checkbox" class="toggle row-cb" title="Activer"></td>
          <td class="p-3 font-medium">${s.nom} ${s.prenom}</td>
          <td class="p-3 text-center"><input type="checkbox" class="toggle full-day-cb" data-sal="${s.id}" ${isFullDay ? 'checked' : ''}></td>
          <td class="p-3"><input type="time" class="border rounded px-2 py-1 text-sm w-24 arr" data-sal="${s.id}" value="${pt.heure_arrivee || ""}" ${isFullDay ? 'disabled' : ''}></td>
          <td class="p-3"><input type="time" class="border rounded px-2 py-1 text-sm w-24 dep" data-sal="${s.id}" value="${pt.heure_depart || ""}" ${isFullDay ? 'disabled' : ''}></td>
          <td class="p-3"><select class="border rounded px-2 py-1 text-sm chantier-sel" data-sal="${s.id}"><option value="">-- Aucun --</option>${chanOpts}</select></td>
          <td class="p-3 text-center"><input type="checkbox" class="toggle absent-cb" data-sal="${s.id}" ${isAbsent ? 'checked' : ''}></td>
          <td class="p-3"><input type="text" class="border rounded px-2 py-1 text-sm w-32 motif" data-sal="${s.id}" value="${pt.motif_absence || ""}" ${isAbsent ? '' : 'disabled'} placeholder="Maladie, congé..."></td>
        `;
        tb.appendChild(tr);
      }

      // Checkbox handlers
      document.querySelectorAll(".row-cb").forEach(cb => {
        cb.checked = !!pointages[cb.closest("tr").dataset.salarieId];
        cb.addEventListener("change", (e) => {
          const tr = e.target.closest("tr");
        });
      });

      document.querySelectorAll(".full-day-cb").forEach(cb => {
        cb.addEventListener("change", (e) => {
          const id = e.target.dataset.sal;
          const tr = document.querySelector(`tr[data-salarie-id="${id}"]`);
          const arr = tr.querySelector(".arr");
          const dep = tr.querySelector(".dep");
          if (e.target.checked) {
            // Determine if Friday
            const dateSel = document.getElementById("pointage-date").value;
            const d = new Date(dateSel);
            const isFri = d.getDay() === 5;
            arr.value = "08:00";
            dep.value = isFri ? "16:00" : "17:00";
            arr.disabled = true;
            dep.disabled = true;
          } else {
            arr.disabled = false;
            dep.disabled = false;
          }
        });
      });

      document.querySelectorAll(".absent-cb").forEach(cb => {
        cb.addEventListener("change", (e) => {
          const tr = e.target.closest("tr");
          const motif = tr.querySelector(".motif");
          const arr = tr.querySelector(".arr");
          const dep = tr.querySelector(".dep");
          const fullCb = tr.querySelector(".full-day-cb");
          if (e.target.checked) {
            motif.disabled = false;
            motif.focus();
            arr.disabled = true; dep.disabled = true;
            fullCb.checked = false; fullCb.disabled = true;
            arr.value = ""; dep.value = "";
          } else {
            motif.disabled = true;
            motif.value = "";
            arr.disabled = false; dep.disabled = false;
            fullCb.disabled = false;
          }
        });
      });

      // Check all rows that already have data
      document.querySelectorAll(".row-cb").forEach(cb => {
        const id = cb.closest("tr").dataset.salarieId;
        const pt = pointages[id];
        if (pt && (pt.chantier_id || pt.motif_absence || pt.heure_arrivee)) cb.checked = true;
      });
    }

    async function saveAll() {
      const date = document.getElementById("pointage-date").value;
      const rows = document.querySelectorAll("#tbody tr");
      let count = 0;

      for (const tr of rows) {
        const salId = parseInt(tr.dataset.salarieId);
        const cb = tr.querySelector(".row-cb");
        if (!cb.checked) continue;

        const fullDay = tr.querySelector(".full-day-cb").checked;
        const absent = tr.querySelector(".absent-cb").checked;
        const chantId = tr.querySelector(".chantier-sel").value;
        let arr = tr.querySelector(".arr").value;
        let dep = tr.querySelector(".dep").value;
        const motif = tr.querySelector(".motif").value;

        if (absent) {
          // Save as absence
          await fetch("/api/pointages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ salarie_id: salId, chantier_id: null, date, heure_arrivee: null, heure_depart: null, type: "manuel", motif_absence: motif })
          });
        } else if (chantId) {
          if (fullDay) {
            const d = new Date(date);
            arr = "08:00";
            dep = d.getDay() === 5 ? "16:00" : "17:00";
          }
          await fetch("/api/pointages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ salarie_id: salId, chantier_id: parseInt(chantId), date, heure_arrivee: arr || null, heure_depart: dep || null, type: "manuel" })
          });
        }
        count++;
      }

      const msgEl = document.getElementById("msg");
      msgEl.textContent = `${count} ligne(s) sauvegardée(s) ✅`;
      msgEl.classList.remove("hidden");
      setTimeout(() => msgEl.classList.add("hidden"), 3000);

      // Reload
      loadForDate(date);
    }

    function openGenModal() { document.getElementById("gen-modal").classList.remove("hidden"); }
    function closeGenModal() {
      document.getElementById("gen-modal").classList.add("hidden");
      document.getElementById("g-result").classList.add("hidden");
    }

    async function doGenerate() {
      const from = document.getElementById("g-from").value;
      const to = document.getElementById("g-to").value;
      if (!from || !to) return;
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ from, to })
      });
      const data = await res.json();
      const r = document.getElementById("g-result");
      r.textContent = data.message || "Fait !";
      r.classList.remove("hidden");
      setTimeout(closeGenModal, 1500);
    }

    document.getElementById("pointage-date").addEventListener("change", (e) => loadForDate(e.target.value));

    load();
  </script>
</body>
</html>

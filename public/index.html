<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage — Pointage Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=checkbox].toggle { width: 18px; height: 18px; cursor: pointer; }
    .sal-block { border-left: 3px solid #e5e7eb; }
    .sal-block.has-data { border-left-color: #3b82f6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-2 flex gap-4 text-sm flex-wrap">
      <a href="index.html" class="py-3 px-2 border-blue-500 border-b-2 text-blue-600 font-semibold">📋 Pointage</a>
      <a href="chantiers.html" class="py-3 px-2 hover:text-blue-600">🏗️ Chantiers</a>
      <a href="salaires.html" class="py-3 px-2 hover:text-blue-600">👷 Salariés</a>
      <a href="calendrier.html" class="py-3 px-2 hover:text-blue-600">📅 Calendrier</a>
      <a href="rapports.html" class="py-3 px-2 hover:text-blue-600">📊 Rapports</a>
      <a href="financier.html" class="py-3 px-2 hover:text-blue-600">💰 Financier</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">📋 Pointage du jour</h1>
        <p class="text-xs text-gray-500 mt-1">Affecter chaque salarié à un chantier ou en absence.</p>
      </div>
      <div class="flex gap-2 items-center">
        <input type="date" id="pointage-date" class="border rounded-lg px-3 py-2 text-sm">
        <button onclick="saveAll()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">💾 Sauvegarder tout</button>
        <button onclick="openGenModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">⚡ Générer</button>
      </div>
    </div>

    <div id="alertes-bar" class="hidden mb-4"></div>
    <div id="salarie-grid" class="space-y-3"></div>
    <div id="msg" class="mt-4 text-sm font-medium hidden"></div>
  </div>

  <!-- Modal Génération -->
  <div id="gen-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-96">
      <h2 class="text-lg font-bold mb-4">⚡ Affecter un salarié à un chantier</h2>
      <p class="text-xs text-gray-500 mb-4">Génère les pointages automatiques (8h-17h Lun-Jeu, 8h-16h Ven).</p>
      <div class="space-y-3">
        <label class="text-sm block"><span class="text-gray-500">Salarié</span>
          <select id="g-sal" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <label class="text-sm block"><span class="text-gray-500">Chantier</span>
          <select id="g-chan" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></select>
        </label>
        <div class="flex gap-3">
          <label class="flex-1 text-sm"><span class="text-gray-500">Du</span><input type="date" id="g-from" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></label>
          <label class="flex-1 text-sm"><span class="text-gray-500">Au</span><input type="date" id="g-to" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></label>
        </div>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button onclick="closeGenModal()" class="px-4 py-2 text-sm border rounded-lg">Annuler</button>
        <button onclick="doGenerate()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg">Générer</button>
      </div>
      <p id="g-result" class="mt-3 text-sm text-green-600 hidden"></p>
    </div>
  </div>

  <script>
    const today = new Date();
    const ds = d => d.toISOString().split("T")[0];
    document.getElementById("pointage-date").value = ds(today);
    document.getElementById("g-from").value = ds(today);
    const nextFri = new Date(today); nextFri.setDate(today.getDate() + ((5 - today.getDay() + 7) % 7));
    document.getElementById("g-to").value = ds(nextFri);

    let allSal = [], allChan = [];

    async function load() {
      [allSal, allChan] = await Promise.all([
        fetch("/api/salaries").then(r=>r.json()),
        fetch("/api/chantiers").then(r=>r.json())
      ]);
      document.getElementById("g-sal").innerHTML = allSal.map(s => `<option value="${s.id}">${s.nom} ${s.prenom}</option>`).join("");
      document.getElementById("g-chan").innerHTML = allChan.map(c => `<option value="${c.id}">${c.nom}</option>`).join("");
      loadForDate(document.getElementById("pointage-date").value);
    }

    async function loadForDate(date) {
      if (!date) return;
      const [pts, alers] = await Promise.all([
        fetch(`/api/pointages?date=${date}`).then(r=>r.json()),
        fetch(`/api/alertes?date=${date}`).then(r=>r.json())
      ]);
      const abar = document.getElementById("alertes-bar");
      if (alers.length > 0) {
        abar.classList.remove("hidden");
        abar.innerHTML = alers.map(a => `<div class="bg-amber-50 border-l-4 border-amber-400 px-4 py-2 text-sm">${a.type === "double_affectation" ? "🔴" : "🟡"} ${a.message}</div>`).join("");
      } else abar.classList.add("hidden");
      render(pts, date);
    }

    function getMaxHours(dateStr) {
      return new Date(dateStr).getDay() === 5 ? 7 : 8;
    }

    function defaultHours(dateStr) {
      return new Date(dateStr).getDay() === 5 ? "16:00" : "17:00";
    }

    function calcMinutes(arr, dep) {
      if (!arr || !dep) return 0;
      const [ah, am] = arr.split(":").map(Number);
      const [dh, dm] = dep.split(":").map(Number);
      return (dh * 60 + dm) - (ah * 60 + am);
    }

    function render(pointages, date) {
      const grid = document.getElementById("salarie-grid");
      grid.innerHTML = "";
      const maxH = getMaxHours(date);

      const bySal = {};
      pointages.forEach(p => {
        if (!bySal[p.salarie_id]) bySal[p.salarie_id] = [];
        bySal[p.salarie_id].push(p);
      });

      for (const s of allSal) {
        const pts = bySal[s.id] || [];
        if (pts.length === 0) pts.push({});

        const block = document.createElement("div");
        block.className = "sal-block bg-white rounded-xl shadow overflow-hidden";
        block.dataset.salId = s.id;

        const head = document.createElement("div");
        head.className = "bg-gray-50 px-4 py-2 flex items-center justify-between border-b";
        head.innerHTML = `<span class="font-semibold text-sm">${s.nom} ${s.prenom}</span><button onclick="addLine(this, ${s.id})" class="text-blue-600 text-xs border border-blue-300 rounded px-2 py-0.5 hover:bg-blue-50">+ Ligne</button>`;
        block.appendChild(head);

        const linesDiv = document.createElement("div");
        linesDiv.className = "lines-c";
        linesDiv.dataset.salId = s.id;

        pts.forEach((pt, idx) => {
          const isFull = pt.heure_arrivee === "08:00" && (pt.heure_depart === "17:00" || pt.heure_depart === "16:00");
          const chanOpts = allChan.map(c => `<option value="${c.id}" ${String(pt.chantier_id) == String(c.id) ? 'selected' : ''}>${c.nom}</option>`).join("");
          const isAbs = !!pt.motif_absence;
          const delVis = pts.length > 1;

          linesDiv.innerHTML += `
            <div class="line-row flex items-center gap-2 px-4 py-2 ${idx%2?'bg-gray-50/50':'bg-white'}">
              <label class="text-xs text-gray-400 w-4">${idx+1}</label>
              <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" class="toggle full-day-cb" ${isFull?'checked':''}> J (${maxH}h)</label>
              <input type="time" class="border rounded px-2 py-1 text-sm w-22 arr" value="${pt.heure_arrivee||''}" ${isFull?'disabled':''}>
              <input type="time" class="border rounded px-2 py-1 text-sm w-22 dep" value="${pt.heure_depart||''}" ${isFull?'disabled':''}>
              <select class="border rounded px-2 py-1 text-sm w-40 affect-sel">
                <option value="">-- Affectation --</option>
                ${chanOpts}
                <option value="absence" ${isAbs?'selected':''}>🚫 Absence</option>
              </select>
              <input type="text" class="border rounded px-2 py-1 text-sm w-28 motif" placeholder="Motif" value="${pt.motif_absence||''}" style="${isAbs?'':'display:none'}">
              <button onclick="delLine(this)" class="text-red-400 text-xs hover:text-red-600 ${delVis?'':'hidden'}">✕</button>
            </div>`;
        });
        block.appendChild(linesDiv);

        const bottom = document.createElement("div");
        bottom.className = "px-4 py-1.5 border-t bg-gray-50/30";
        bottom.innerHTML = `<label class="flex items-center gap-1.5 text-xs text-gray-500"><input type="checkbox" class="toggle desactive-cb"> Désactivé ce jour</label>`;
        block.appendChild(bottom);
        grid.appendChild(block);
      }

      // Wire up events
      document.querySelectorAll(".full-day-cb").forEach(cb => {
        cb.addEventListener("change", e => {
          const row = e.target.closest(".line-row");
          const arr = row.querySelector(".arr"), dep = row.querySelector(".dep");
          if (e.target.checked) { arr.value = "08:00"; dep.value = defaultHours(date); arr.disabled = true; dep.disabled = true; }
          else { arr.disabled = false; dep.disabled = false; }
        });
      });
      document.querySelectorAll(".affect-sel").forEach(sel => {
        sel.addEventListener("change", e => {
          const row = e.target.closest(".line-row");
          const motif = row.querySelector(".motif");
          motif.style.display = e.target.value === "absence" ? "" : "none";
          if (e.target.value !== "absence") { motif.value = ""; }
        });
      });
    }

    function addLine(btn, salId) {
      const container = btn.closest(".sal-block").querySelector(".lines-c");
      const cnt = container.querySelectorAll(".line-row").length + 1;
      const date = document.getElementById("pointage-date").value;
      const div = document.createElement("div");
      div.className = "line-row flex items-center gap-2 px-4 py-2 bg-gray-50/50";
      div.innerHTML = `
        <label class="text-xs text-gray-400 w-4">${cnt}</label>
        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" class="toggle full-day-cb"> J (${getMaxHours(date)}h)</label>
        <input type="time" class="border rounded px-2 py-1 text-sm w-22 arr">
        <input type="time" class="border rounded px-2 py-1 text-sm w-22 dep">
        <select class="border rounded px-2 py-1 text-sm w-40 affect-sel">
          <option value="">-- Affectation --</option>
          ${allChan.map(c => `<option value="${c.id}">${c.nom}</option>`).join("")}
          <option value="absence">🚫 Absence</option>
        </select>
        <input type="text" class="border rounded px-2 py-1 text-sm w-28 motif" placeholder="Motif" style="display:none">
        <button onclick="delLine(this)" class="text-red-400 text-xs hover:text-red-600">✕</button>`;
      container.appendChild(div);
      div.querySelector(".full-day-cb").addEventListener("change", e => {
        const arr = div.querySelector(".arr"), dep = div.querySelector(".dep");
        if (e.target.checked) { arr.value = "08:00"; dep.value = defaultHours(date); arr.disabled = true; dep.disabled = true; }
        else { arr.disabled = false; dep.disabled = false; }
      });
      div.querySelector(".affect-sel").addEventListener("change", e => {
        const motif = div.querySelector(".motif");
        motif.style.display = e.target.value === "absence" ? "" : "none";
        if (e.target.value !== "absence") motif.value = "";
      });
    }

    function delLine(btn) {
      const container = btn.closest(".lines-c");
      if (container.querySelectorAll(".line-row").length <= 1) return;
      btn.closest(".line-row").remove();
      container.querySelectorAll(".line-row").forEach((r, i) => { r.querySelector("label:first-child").textContent = i + 1; });
    }

    async function saveAll() {
      const date = document.getElementById("pointage-date").value;
      const lines = [], errors = [];
      const maxH = getMaxHours(date);

      document.querySelectorAll(".sal-block").forEach(block => {
        const salId = parseInt(block.dataset.salId);
        const name = block.querySelector(".font-semibold").textContent.trim();
        if (block.querySelector(".desactive-cb").checked) return;

        let totalMin = 0, hasAbs = false, hasWork = false;

        block.querySelectorAll(".line-row").forEach(row => {
          const full = row.querySelector(".full-day-cb").checked;
          const affect = row.querySelector(".affect-sel").value;
          const motif = row.querySelector(".motif").value;
          let arr = row.querySelector(".arr").value, dep = row.querySelector(".dep").value;

          if (affect === "absence") {
            hasAbs = true;
            lines.push({ salarie_id: salId, chantier_id: null, heure_arrivee: null, heure_depart: null, motif_absence: motif || "Absence", type: "manuel" });
            return;
          }

          if (affect) {
            hasWork = true;
            if (full || (!arr && !dep)) { arr = "08:00"; dep = defaultHours(date); }
            totalMin += calcMinutes(arr, dep);
            lines.push({ salarie_id: salId, chantier_id: parseInt(affect), heure_arrivee: arr, heure_depart: dep, motif_absence: null, type: "manuel" });
          }
        });

        if (!hasAbs && !hasWork) { errors.push(`⚠️ ${name} : aucune saisie`); }
        else if (!hasAbs && Math.abs(totalMin/60 - maxH) > 0.5) { errors.push(`⚠️ ${name} : ${(totalMin/60).toFixed(1)}h au lieu de ${maxH}h`); }
      });

      const msgEl = document.getElementById("msg");
      if (errors.length > 0) {
        msgEl.innerHTML = errors.join("<br>");
        msgEl.className = "mt-4 text-sm text-red-600 font-medium";
        msgEl.classList.remove("hidden");
        setTimeout(() => msgEl.classList.add("hidden"), 5000);
        return;
      }
      if (lines.length === 0) {
        msgEl.textContent = "Rien à sauvegarder";
        msgEl.className = "mt-4 text-sm text-gray-500 font-medium";
        msgEl.classList.remove("hidden");
        setTimeout(() => msgEl.classList.add("hidden"), 3000);
        return;
      }

      await fetch("/api/pointages/bulk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date, lines })
      });
      msgEl.textContent = `${lines.length} ligne(s) sauvegardée(s) ✅`;
      msgEl.className = "mt-4 text-sm text-green-600 font-medium";
      msgEl.classList.remove("hidden");
      setTimeout(() => msgEl.classList.add("hidden"), 3000);
      loadForDate(date);
    }

    function openGenModal() { document.getElementById("gen-modal").classList.remove("hidden"); }
    function closeGenModal() { document.getElementById("gen-modal").classList.add("hidden"); document.getElementById("g-result").classList.add("hidden"); }
    async function doGenerate() {
      const sal = document.getElementById("g-sal").value, chan = document.getElementById("g-chan").value;
      const from = document.getElementById("g-from").value, to = document.getElementById("g-to").value;
      if (!sal || !chan || !from || !to) return alert("Remplis tous les champs");
      const res = await fetch("/api/generate", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({salarie_id:parseInt(sal),chantier_id:parseInt(chan),from,to})});
      const data = await res.json();
      const r = document.getElementById("g-result");
      r.textContent = data.message || "Fait !"; r.classList.remove("hidden");
      setTimeout(() => { closeGenModal(); loadForDate(document.getElementById("pointage-date").value); }, 2000);
    }

    document.getElementById("pointage-date").addEventListener("change", e => loadForDate(e.target.value));
    load();
  </script>
</body>
</html>
